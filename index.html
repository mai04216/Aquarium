<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイアクアリウム(仮称)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hud">
    <div class="balance" id="balance">🪙 <span id="balance-value">0</span></div>
  </div>

  <div class="tank" id="tank">
    <div class="bubble-layer" id="bubble-layer"></div>

    <div class="fish-action-panel" id="fish-action-panel" hidden>
      <div class="fish-action-name" id="fish-action-name"></div>
      <p class="fish-action-hint" id="fish-action-hint">水槽内をクリックして位置を移動</p>
      <div class="fish-action-buttons">
        <button id="fish-action-remove">🎒 インベントリに戻す</button>
        <button id="fish-action-cancel">✕ 選択解除</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button id="open-shop">🛒 ショップ</button>
    <button id="open-inventory">🎒 インベントリ</button>
    <button id="open-tank">🐟 水槽</button>
  </div>

  <div class="modal-overlay" id="shop-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>ショップ</h2>
        <button id="close-shop" aria-label="閉じる">✕</button>
      </div>
      <ul class="shop-list" id="shop-list"></ul>
    </div>
  </div>

  <div class="modal-overlay" id="inventory-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>インベントリ</h2>
        <button id="close-inventory" aria-label="閉じる">✕</button>
      </div>
      <p class="fish-count-info" id="fish-count-info"></p>
      <ul class="shop-list" id="inventory-list"></ul>
    </div>
  </div>

  <div class="modal-overlay" id="tank-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>水槽の切り替え</h2>
        <button id="close-tank" aria-label="閉じる">✕</button>
      </div>
      <ul class="shop-list" id="tank-list"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
