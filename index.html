<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイアクアリウム(仮称)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hud">
    <div class="balance" id="balance">🪙 <span id="balance-value">0</span></div>
  </div>

  <div class="tank" id="tank">
    <div class="fish" id="fish-1" data-interval-sec="30" data-amount="5">
      <div class="fish-shape"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button id="open-shop">🛒 ショップ</button>
  </div>

  <div class="modal-overlay" id="shop-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>ショップ</h2>
        <button id="close-shop" aria-label="閉じる">✕</button>
      </div>
      <ul class="shop-list" id="shop-list"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
