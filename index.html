<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイアクアリウム(仮称)</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b132b" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
</head>
<body>
  <div class="hud">
    <div class="balance" id="balance">🪙 <span id="balance-value">0</span></div>
    <div class="buff-indicator" id="buff-indicator" hidden>🍤 x1.5 <span id="buff-remaining"></span></div>
    <button class="settings-btn" id="open-settings" aria-label="設定">⚙</button>
  </div>

  <div class="fish-action-panel" id="fish-action-panel" hidden>
    <div class="fish-action-name" id="fish-action-name"></div>
    <p class="fish-action-hint" id="fish-action-hint">水槽内をクリックして位置を移動</p>
    <div class="fish-action-buttons">
      <button id="fish-action-remove">🎒 インベントリに戻す</button>
      <button id="fish-action-cancel">✕ 選択解除</button>
    </div>
  </div>

  <div class="tanks-viewport" id="tanks-viewport">
    <button class="tank-nav-arrow tank-nav-prev" id="tank-nav-prev" aria-label="前の水槽">‹</button>
    <div class="tanks-track" id="tanks-track"></div>
    <button class="tank-nav-arrow tank-nav-next" id="tank-nav-next" aria-label="次の水槽">›</button>
  </div>

  <div class="bottom-nav">
    <button id="open-shop">🛒 ショップ</button>
    <button id="open-inventory">🎒 インベントリ</button>
    <button id="feed-btn">🍤 餌やり</button>
  </div>

  <div class="modal-overlay" id="shop-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>ショップ</h2>
        <button id="close-shop" aria-label="閉じる">✕</button>
      </div>
      <ul class="shop-list" id="shop-list"></ul>
    </div>
  </div>

  <div class="modal-overlay" id="inventory-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>インベントリ</h2>
        <button id="close-inventory" aria-label="閉じる">✕</button>
      </div>
      <label class="inventory-tank-select-label">
        配置先の水槽:
        <select id="inventory-tank-select"></select>
      </label>
      <p class="fish-count-info" id="fish-count-info"></p>
      <ul class="shop-list" id="inventory-list"></ul>
    </div>
  </div>

  <div class="modal-overlay" id="settings-modal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>設定</h2>
        <button id="close-settings" aria-label="閉じる">✕</button>
      </div>
      <ul class="settings-list">
        <li class="settings-item">
          <span>BGM</span>
          <label class="switch">
            <input type="checkbox" id="toggle-bgm" />
            <span class="switch-label"></span>
          </label>
        </li>
        <li class="settings-item">
          <span>効果音</span>
          <label class="switch">
            <input type="checkbox" id="toggle-sfx" />
            <span class="switch-label"></span>
          </label>
        </li>
      </ul>
    </div>
  </div>

  <div class="modal-overlay" id="welcome-modal" hidden>
    <div class="modal welcome-modal">
      <h2>おかえり!🐟</h2>
      <p class="welcome-text" id="welcome-text"></p>
      <button id="welcome-ok">受け取る</button>
    </div>
  </div>

  <script src="sound.js"></script>
  <script src="script.js"></script>
  <script>
    // Service Worker 登録(PWA)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {
          /* 登録失敗時もアプリは通常どおり動作する */
        });
      });
    }
  </script>
</body>
</html>
